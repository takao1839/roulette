<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サウナルーレット・プロ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap');
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #e0f2fe; }
        #wheel { transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">🧖‍♂️ 共有サウナルーレット 🧖‍♀️</h1>
            <p id="debug-status" class="text-sm text-red-500 font-bold">システム接続中...</p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 items-start">
            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-400">
                <div class="mb-6 border-b pb-4">
                    <h2 class="text-xl mb-4 font-bold italic text-blue-800">✍️ 候補を投稿</h2>
                    <div class="flex flex-col gap-2">
                        <input type="text" id="userName" placeholder="あなたの名前" class="border p-2 rounded focus:ring-2 focus:ring-blue-300 outline-none">
                        <input type="text" id="locName" placeholder="サウナ施設名" class="border p-2 rounded focus:ring-2 focus:ring-blue-300 outline-none">
                        <button onclick="addLocation()" id="addBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded transition shadow-md">投稿して保存！</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-blue-800">📊 候補リスト</h2>
                        <button onclick="resetAll()" class="text-xs text-red-400 hover:underline">全リセット</button>
                    </div>
                    <ul id="locationList" class="space-y-2 text-gray-500 italic text-sm">
                        投稿をお待ちしています...
                    </ul>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div class="relative w-[300px] h-[300px] md:w-[380px] md:h-[380px]">
                    <div class="absolute top-[-15px] left-1/2 -translate-x-1/2 z-20 w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[30px] border-t-red-500"></div>
                    <canvas id="wheel" width="400" height="400" class="w-full h-full rounded-full bg-white shadow-2xl"></canvas>
                    <button id="spinBtn" onclick="spin()" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-yellow-400 border-4 border-white rounded-full font-bold shadow-lg z-30 transition transform active:scale-95 text-blue-900">GO!</button>
                </div>
                <div id="statusMsg" class="mt-8 text-xl font-bold text-blue-800 text-center min-h-[3em] bg-white p-4 rounded-xl shadow-sm w-full border border-blue-100">
                    施設を追加してスタート！
                </div>
            </div>
        </div>
    </div>

    <audio id="sound-drum" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sound-cymbal" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>

    <script>
        // --- 設定 (提供された情報を修正して入力済み) ---
        const SUPABASE_URL = 'https://ajrrcgocmfnwzoskxups.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqcnJjZ29jbWZud3pvc2t4dXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MDg1NjUsImV4cCI6MjA5ODA4NDU2NX0.UbFxhyLoXCYnopPfVMdQLBfL-Ob0P5LBPK4v97a-y48';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const debugStatus = document.getElementById('debug-status');
        let items = [];
        let rotation = 0;
        let isSpinning = false;
        const colors = ['#FF6B6B', '#4D96FF', '#FFD93D', '#6BCB77', '#9575CD', '#FFA447', '#4DB6AC'];

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('statusMsg');

        async function loadData() {
            debugStatus.innerText = "データ読み込み中...";
            try {
                const { data, error } = await supabase.from('sauna_list').select('*').order('created_at', { ascending: true });
                if (error) throw error;
                
                items = data.map(d => ({ id: d.id, name: d.user_name, location: d.location_name, count: d.win_count }));
                debugStatus.innerText = "✅ 接続完了";
                debugStatus.classList.replace('text-red-500', 'text-green-500');
                
                updateUI();
                drawWheel();
            } catch (err) {
                console.error(err);
                debugStatus.innerText = "❌ 接続失敗: " + err.message;
            }
        }
