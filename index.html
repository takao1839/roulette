<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サウナルーレット (割合設定つき)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap');
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #f0f9ff; }
        #wheel { transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">🧖‍♂️ サウナルーレット 🧖‍♀️</h1>
            <div id="status" class="inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-gray-200 text-gray-500 uppercase">Connecting...</div>
        </header>

        <div class="grid md:grid-cols-2 gap-8 items-start">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-blue-400">
                <div class="mb-6 border-b border-dashed pb-6">
                    <h2 class="text-xl mb-4 font-bold text-blue-800">✍️ 施設を追加</h2>
                    <div class="flex flex-col gap-3">
                        <input type="text" id="userName" placeholder="あなたの名前" class="border-2 border-blue-50 p-3 rounded-xl outline-none focus:border-blue-400">
                        <input type="text" id="locName" placeholder="サウナ施設名" class="border-2 border-blue-50 p-3 rounded-xl outline-none focus:border-blue-400">
                        <button onclick="addSauna()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg transition active:scale-95">
                            リストに追加
                        </button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-lg font-bold text-blue-900 italic">📊 候補リスト</h2>
                        <button onclick="resetAll()" class="text-[10px] text-red-300 hover:text-red-500 font-bold uppercase">All Reset</button>
                    </div>
                    <ul id="locationList" class="space-y-2 max-h-80 overflow-y-auto">
                        </ul>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div class="relative w-[300px] h-[300px] md:w-[380px] md:h-[380px]">
                    <div class="absolute top-[-15px] left-1/2 -translate-x-1/2 z-20 w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[30px] border-t-red-500 shadow-md"></div>
                    <canvas id="wheel" width="400" height="400" class="w-full h-full rounded-full bg-white shadow-2xl"></canvas>
                    <button onclick="spin()" id="spinBtn" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-yellow-400 hover:bg-yellow-500 border-4 border-white rounded-full font-bold text-blue-900 shadow-lg z-30 transition transform active:scale-90">
                        GO!
                    </button>
                </div>
                <div id="statusMsg" class="mt-8 text-xl font-bold text-blue-800 text-center min-h-[3em] bg-white p-5 rounded-2xl shadow-sm w-full border-2 border-blue-50"></div>
            </div>
        </div>
    </div>

    <audio id="sound-drum" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sound-cymbal" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>

    <script>
        // --- あなたのFirebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlSbtHvI4Xsv-WvYkVbgGZpeVqMFSiqfA",
            authDomain: "roulette-c21b9.firebaseapp.com",
            projectId: "roulette-c21b9",
            storageBucket: "roulette-c21b9.firebasestorage.app",
            messagingSenderId: "1037733313679",
            appId: "1:1037733313679:web:bc5a94119503c1231f84fa",
            measurementId: "G-Z3ZBMP2CMV",
            databaseURL: "https://roulette-c21b9-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // Firebase初期化
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const saunaRef = db.ref('sauna_list');

        let items = [];
        let rotation = 0;
        let isSpinning = false;
        const colors = ['#FF6B6B', '#4D96FF', '#FFD93D', '#6BCB77', '#9575CD', '#FFA447', '#4DB6AC'];

        // 1. データのリアルタイム受信
        saunaRef.on('value', (snapshot) => {
            // データが届いた時点で、まずは即座にONLINEにする（フリーズ防止）
            document.getElementById('status').innerText = "✅ ONLINE";
            document.getElementById('status').className = "inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-green-500 text-white uppercase";

            try {
                const data = snapshot.val();
                items = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        const itemData = data[key];
                        if (!itemData) return;

                        let w = 1;
                        if (itemData.weight !== undefined && itemData.weight !== null) {
                            w = parseInt(itemData.weight, 10);
                        }
                        if (isNaN(w) || w < 1) w = 1;

                        let wc = 0;
                        if (itemData.win_count !== undefined && itemData.win_count !== null) {
                            wc = parseInt(itemData.win_count, 10);
                        }
                        if (isNaN(wc)) wc = 0;

                        items.push({
                            id: key,
                            user_name: itemData.user_name || '不明',
                            location_name: itemData.location_name || '未設定',
                            win_count: wc,
                            weight: w
                        });
                    });
                }
                updateUI();
                drawWheel();
            } catch (error) {
                console.error("Firebaseデータ処理エラー:", error);
            }
        }, (error) => {
            // Firebase自体への接続に失敗した場合
            console.error("Firebase接続エラー:", error);
            document.getElementById('status').innerText = "❌ ERROR";
            document.getElementById('status').className = "inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-red-500 text-white uppercase";
        });

        // 2. データの投稿
        function addSauna() {
            const user = document.getElementById('userName').value;
            const loc = document.getElementById('locName').value;

            if (!user || !loc) return alert('名前と施設名を入力してください');

            saunaRef.push({
                user_name: user,
                location_name: loc,
                win_count: 0,
                weight: 1
            });
            document.getElementById('locName').value = '';
        }

        // 3. 比率のリアルタイム変更（安全な引数処理に修正）
        function changeWeight(id, currentWeight, delta) {
            let newWeight = parseInt(currentWeight, 10) + parseInt(delta, 10);
            if (isNaN(newWeight) || newWeight < 1) newWeight = 1;
            if (newWeight > 10) newWeight = 10;

            saunaRef.child(id).update({ weight: newWeight });
        }

        // 4. 項目の削除
        function removeItem(id) {
            if (confirm('この項目をリストから消しますか？')) {
                saunaRef.child(id).remove()
                    .then(() => { console.log("削除成功"); })
                    .catch((error) => { alert("削除に失敗しました: " + error.message); });
            }
        }

        // 5. 当選回数の更新
        function updateWin(item) {
