<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サウナ施設決定ルーレット</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f8ff; }
        #wheel-container { position: relative; width: 400px; height: 400px; margin: 20px auto; }
        canvas { border-radius: 50%; border: 5px solid #333; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
                   border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid red; z-index: 10; }
        .controls { margin: 20px; padding: 20px; background: white; border-radius: 10px; display: inline-block; }
        .list-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .entry-list, .count-list { text-align: left; background: white; padding: 15px; border-radius: 10px; min-width: 200px; }
        .winner-msg { font-size: 24px; color: #d32f2f; font-weight: bold; margin: 20px; }
        .hit-3 { color: red; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>🔥 サウナ施設決定ルーレット 🔥</h1>
    <p>3回当たったらそこに決定！</p>

    <div class="controls">
        <input type="text" id="userName" placeholder="名前">
        <input type="text" id="locationName" placeholder="行きたいサウナ">
        <button onclick="addEntry()">投稿する</button>
        <br><br>
        <button id="spinBtn" onclick="spinWheel()" style="padding: 10px 40px; font-size: 18px; cursor: pointer;">回転！！</button>
    </div>

    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <div id="result" class="winner-msg"></div>

    <div class="list-container">
        <div class="entry-list">
            <h3>📝 候補リスト</h3>
            <ul id="entryItems"></ul>
        </div>
        <div class="count-list">
            <h3>🏆 当選カウント</h3>
            <ul id="countItems"></ul>
        </div>
    </div>

    <!-- ドラムロール音（ネット上のフリー音源などを使用可能） -->
    <audio id="drumroll" src="https://www.soundjay.com/misc/sounds/drum-roll-01.mp3"></audio>
    <audio id="cymbal" src="https://www.soundjay.com/misc/sounds/crash-cymbal-1.mp3"></audio>

    <script>
        let entries = [];
        let winCounts = {};
        let isSpinning = false;
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const colors = ["#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff"];

        function addEntry() {
            const name = document.getElementById('userName').value;
            const loc = document.getElementById('locationName').value;
            if (!name || !loc) return alert("名前と場所を入力してね");

            entries.push({ name, loc });
            if (!winCounts[loc]) winCounts[loc] = 0;

            updateUI();
            drawWheel();
            document.getElementById('userName').value = "";
            document.getElementById('locationName').value = "";
        }

        function updateUI() {
            const list = document.getElementById('entryItems');
            list.innerHTML = entries.map(e => `<li>${e.loc} (${e.name}さん)</li>`).join('');

            const counts = document.getElementById('countItems');
            counts.innerHTML = Object.keys(winCounts).map(loc => 
                `<li class="${winCounts[loc] >= 3 ? 'hit-3' : ''}">${loc}: ${winCounts[loc]}回 ${winCounts[loc] >= 3 ? '🎉決定！' : ''}</li>`
            ).join('');
        }

        function drawWheel() {
            const numSegments = entries.length || 1;
            const angle = 2 * Math.PI / numSegments;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, i * angle, (i + 1) * angle);
                ctx.fill();
                ctx.stroke();

                // テキスト描画
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(i * angle + angle / 2);
                ctx.fillStyle = "#333";
                ctx.font = "14px bold sans-serif";
                ctx.fillText(entries[i] ? entries[i].loc : "施設を追加して", 70, 5);
                ctx.restore();
            }
        }

        function spinWheel() {
            if (entries.length < 2 || isSpinning) return alert("候補を2つ以上入れてね");
            
            isSpinning = true;
            document.getElementById('result').innerText = "抽選中...";
            
            const drumroll = document.getElementById('drumroll');
            drumroll.currentTime = 0;
            drumroll.play();

            const extraSpins = 5 + Math.random() * 5; 
            const totalRotation = extraSpins * 360;
            const randomOffset = Math.random() * 360;
            const finalRotation = totalRotation + randomOffset;

            canvas.style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                drumroll.pause();
                document.getElementById('cymbal').play();

                // 当選判定
                const actualRotation = finalRotation % 360;
                const segmentAngle = 360 / entries.length;
                // 針が上(270度)にあるので計算を調整
                const winningIndex = Math.floor(((360 - actualRotation + 270) % 360) / segmentAngle);
                const winner = entries[winningIndex];

                winCounts[winner.loc]++;
                document.getElementById('result').innerText = `当選：${winner.loc} (${winner.name}さんの投稿)`;
                
                if (winCounts[winner.loc] >= 3) {
                    document.getElementById('result').innerHTML = `🎊 【${winner.loc}】に決定しました！！ 🎊`;
                    document.getElementById('spinBtn').disabled = true;
                }
                updateUI();
            }, 4000);
        }

        drawWheel();
    </script>
</body>
</html>
